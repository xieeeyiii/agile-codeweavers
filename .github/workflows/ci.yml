name: Python CI Build & Test

# 触发条件：向develop分支发起PR时自动运行
on:
  pull_request:
    branches: [ develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 配置Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' # 适配你的项目Python版本，可按需修改

      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest # 安装单元测试框架

      # 运行代码编译检查（Python为解释型语言，做语法检查）
      - name: Syntax check
        run: python -m py_compile *.py

      # 运行单元测试
      - name: Run unit tests
        run: pytest -v
